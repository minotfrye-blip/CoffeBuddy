<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Coffee Brewing Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #0f1f38;
            --navy-light: #162a4a;
            --gold: #f0a500;
            --gold-light: #f5bc3c;
            --gold-muted: rgba(240, 165, 0, 0.15);
            --gold-subtle: rgba(240, 165, 0, 0.08);
            --white: #f4f0eb;
            --white-muted: rgba(244, 240, 235, 0.6);
            --white-dim: rgba(244, 240, 235, 0.35);
            --font-display: 'DM Sans', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
        }

        .header {
            padding: 32px 0 24px;
            text-align: center;
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .header p {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--white-dim);
            letter-spacing: 0.06em;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--navy-mid);
            border-radius: var(--radius-md);
            padding: 4px;
            border: 1px solid var(--navy-light);
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 10px 8px;
            background: none;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white-dim);
            transition: all 0.2s ease;
        }
        .tab.active {
            background: var(--navy-light);
            color: var(--gold);
        }
        .tab:hover:not(.active) { color: var(--white-muted); }

        .content { padding: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-title {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--white-dim);
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: var(--navy-mid);
            border: 1.5px solid var(--navy-light);
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--white);
            transition: border-color 0.2s ease;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
        }
        input::placeholder, textarea::placeholder { color: var(--white-dim); }
        select option { background: var(--navy-mid); color: var(--white); }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        .btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 28px;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(240, 165, 0, 0.3);
        }
        .btn:hover { box-shadow: 0 6px 28px rgba(240, 165, 0, 0.4); transform: translateY(-1px); }
        .btn-secondary {
            background: transparent; color: var(--gold);
            border: 1.5px solid var(--gold); box-shadow: none; padding: 11px 28px;
        }
        .btn-secondary:hover { background: var(--gold-subtle); box-shadow: none; transform: none; }
        .btn-ghost {
            background: var(--gold-subtle); color: var(--gold-light);
            box-shadow: none; font-weight: 500;
        }
        .btn-ghost:hover { background: var(--gold-muted); box-shadow: none; transform: none; }
        .btn-small { padding: 7px 16px; font-size: 11px; border-radius: var(--radius-sm); }
        .btn-small.btn-secondary { padding: 6px 16px; }
        .btn-danger {
            background: transparent; color: rgba(255, 100, 100, 0.7);
            border: 1.5px solid rgba(255, 100, 100, 0.25); box-shadow: none;
        }
        .btn-danger:hover { background: rgba(255, 60, 60, 0.08); box-shadow: none; transform: none; }

        .recipe-card {
            background: var(--navy-mid);
            padding: 28px;
            border-radius: var(--radius-lg);
            margin-top: 24px;
            border: 1px solid var(--navy-light);
        }
        .recipe-card h3 {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 600;
            color: var(--white); margin-bottom: 20px;
        }
        .recipe-detail {
            display: flex; justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(240, 165, 0, 0.06);
        }
        .recipe-detail:last-of-type { border-bottom: none; }
        .recipe-label {
            font-family: var(--font-display); font-weight: 500;
            font-size: 13px; color: var(--white-muted);
        }
        .recipe-value {
            font-family: var(--font-mono); font-size: 13px;
            color: var(--gold-light); font-weight: 500;
        }

        .brew-steps {
            background: var(--navy); padding: 20px;
            border-radius: var(--radius-md); margin-top: 20px;
        }
        .brew-steps h4 {
            font-family: var(--font-display); font-size: 13px;
            font-weight: 500; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--gold-light);
            margin-bottom: 16px;
        }
        .brew-step {
            padding: 10px 0;
            border-bottom: 1px solid rgba(240, 165, 0, 0.06);
            font-family: var(--font-body); font-size: 14px;
            color: var(--white-muted); line-height: 1.6;
        }
        .brew-step:last-child { border-bottom: none; }
        .step-number {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--gold); color: var(--navy);
            width: 22px; height: 22px; border-radius: var(--radius-pill);
            font-family: var(--font-display); font-size: 11px;
            font-weight: 700; margin-right: 10px; flex-shrink: 0;
        }
        .brew-step strong { color: var(--gold-light); font-weight: 600; }

        .bean-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px; margin-top: 16px;
        }
        .bean-card {
            background: var(--navy-mid); border: 1px solid var(--navy-light);
            border-radius: var(--radius-lg); padding: 20px;
            transition: all 0.2s ease; cursor: pointer;
        }
        .bean-card:hover { border-color: rgba(240, 165, 0, 0.3); }
        .bean-card.archived { opacity: 0.45; }
        .bean-name {
            font-family: var(--font-display); font-weight: 600;
            color: var(--white); font-size: 15px; margin-bottom: 6px;
        }
        .bean-details {
            font-family: var(--font-mono); font-size: 11px;
            color: var(--white-dim); margin-bottom: 12px; letter-spacing: 0.02em;
        }
        .bean-setting {
            background: var(--gold-subtle);
            border: 1px solid rgba(240, 165, 0, 0.15);
            padding: 8px 12px; border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 12px;
            font-weight: 500; color: var(--gold-light); margin-top: 8px;
        }
        .bean-actions { display: flex; gap: 8px; margin-top: 12px; }

        .ratio-selector { display: flex; gap: 8px; }
        .ratio-btn {
            flex: 1; padding: 10px 8px;
            border: 1.5px solid var(--navy-light);
            background: var(--navy-mid); border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.2s ease;
            font-family: var(--font-mono); font-size: 12px;
            font-weight: 500; color: var(--white-dim); text-align: center;
        }
        .ratio-btn.selected {
            border-color: var(--gold);
            background: var(--gold-subtle); color: var(--gold);
        }
        .ratio-btn:hover:not(.selected) { color: var(--white-muted); }

        .photo-upload-zone {
            border: 1.5px dashed var(--navy-light);
            border-radius: var(--radius-lg); padding: 28px;
            text-align: center; cursor: pointer;
            transition: all 0.2s ease;
            background: var(--navy-mid); position: relative; overflow: hidden;
        }
        .photo-upload-zone:hover {
            border-color: rgba(240, 165, 0, 0.4);
            background: rgba(240, 165, 0, 0.04);
        }
        .photo-upload-zone.has-photo {
            border-style: solid; border-color: rgba(240, 165, 0, 0.3);
            padding: 0; background: var(--navy);
        }
        .photo-upload-zone input[type="file"] { display: none; }
        .photo-upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.6; }
        .photo-upload-text { font-family: var(--font-body); font-size: 13px; color: var(--white-dim); }
        .photo-upload-text span { color: var(--gold); font-weight: 500; }
        .photo-preview {
            width: 100%; max-height: 220px;
            object-fit: contain; display: block; border-radius: 14px;
        }
        .photo-remove-btn {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.6); color: var(--white);
            border: none; width: 28px; height: 28px;
            border-radius: var(--radius-pill); font-size: 16px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: background 0.2s ease; z-index: 2;
        }
        .photo-remove-btn:hover { background: rgba(180, 40, 40, 0.8); }
        .bean-card-photo {
            width: 100%; height: 130px; object-fit: cover;
            border-radius: var(--radius-sm); margin-bottom: 12px;
        }
        .recipe-photo {
            width: 100%; max-height: 200px; object-fit: contain;
            border-radius: var(--radius-md); margin-bottom: 20px;
            background: var(--navy);
        }

        @keyframes scan-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .scanning .photo-preview { animation: scan-pulse 1.5s ease-in-out infinite; }
        .scan-filled {
            border-color: rgba(240, 165, 0, 0.4) !important;
            background: rgba(240, 165, 0, 0.06) !important;
        }

        .adjustment-guide {
            background: var(--navy-mid); padding: 20px;
            border-radius: var(--radius-md); margin-top: 20px;
            border-left: 3px solid var(--gold);
        }
        .adjustment-guide h4 {
            font-family: var(--font-display); font-size: 14px;
            font-weight: 600; color: var(--gold-light); margin-bottom: 12px;
        }
        .adjustment-guide p {
            font-family: var(--font-body); font-size: 13px;
            color: var(--white-muted); margin-bottom: 8px; line-height: 1.6;
        }
        .adjustment-guide strong { color: var(--gold-light); }
        .adjustment-guide ul { padding-left: 18px; margin-top: 8px; }
        .adjustment-guide li {
            font-family: var(--font-body); font-size: 13px;
            color: var(--white-muted); margin-bottom: 4px; line-height: 1.6;
        }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-family: var(--font-body); font-size: 14px; color: var(--white-dim); }

        .divider { display: flex; align-items: center; gap: 12px; margin: 8px 0 20px; }
        .divider-line { flex: 1; height: 1px; background: var(--navy-light); }
        .divider-btn {
            background: none; border: none; color: var(--white-dim);
            font-family: var(--font-display); font-size: 11px;
            letter-spacing: 0.08em; cursor: pointer; white-space: nowrap;
            transition: color 0.2s ease;
        }
        .divider-btn:hover { color: var(--white-muted); }

        .scan-status {
            display: none; margin-top: 12px; padding: 14px 16px;
            border-radius: var(--radius-md); background: var(--gold-subtle);
            border: 1px solid rgba(240, 165, 0, 0.15);
            font-family: var(--font-body); font-size: 13px; color: var(--gold-light);
        }

        .archived-heading {
            font-family: var(--font-display); font-size: 11px; font-weight: 500;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--white-dim); margin: 28px 0 16px;
        }

        .freshness-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: var(--radius-pill);
            font-family: var(--font-mono); font-size: 10px;
            font-weight: 500; margin-top: 6px;
        }
        .freshness-fresh { background: rgba(80,200,120,0.12); color: rgba(80,200,120,0.8); border: 1px solid rgba(80,200,120,0.2); }
        .freshness-aging { background: rgba(240,165,0,0.1); color: var(--gold-light); border: 1px solid rgba(240,165,0,0.2); }
        .freshness-old { background: rgba(255,80,80,0.08); color: rgba(255,100,100,0.7); border: 1px solid rgba(255,80,80,0.15); }
        .brew-count {
            font-family: var(--font-mono); font-size: 10px;
            color: var(--white-dim); margin-top: 8px; letter-spacing: 0.03em;
        }

        /* Brew History */
        .brew-history {
            margin-top: 24px;
        }
        .brew-history-heading {
            font-family: var(--font-display); font-size: 13px; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--white-dim); margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .brew-history-toggle {
            background: none; border: none; color: var(--gold);
            font-family: var(--font-mono); font-size: 11px;
            cursor: pointer; letter-spacing: 0.04em;
        }
        .brew-log-entry {
            background: var(--navy);
            border: 1px solid var(--navy-light);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 8px;
        }
        .brew-log-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .brew-log-date {
            font-family: var(--font-mono); font-size: 11px; color: var(--white-dim);
        }
        .brew-log-grind {
            font-family: var(--font-mono); font-size: 11px;
            color: var(--gold-light); background: var(--gold-subtle);
            border: 1px solid rgba(240,165,0,0.15);
            padding: 3px 8px; border-radius: var(--radius-pill);
        }
        .brew-log-notes {
            font-family: var(--font-body); font-size: 13px;
            color: var(--white-muted); line-height: 1.5; margin-bottom: 8px;
        }
        .brew-log-analysis {
            font-family: var(--font-body); font-size: 12px;
            color: var(--white-dim); line-height: 1.5;
            border-top: 1px solid rgba(240,165,0,0.06); padding-top: 8px;
        }
        .brew-log-analysis strong { color: var(--gold-light); }

        /* AI analysis loading state */
        .analysis-loading {
            display: flex; align-items: center; gap: 10px;
            padding: 16px; background: var(--navy-mid);
            border-radius: var(--radius-md); margin-top: 20px;
            border: 1px solid var(--navy-light);
        }
        .analysis-loading-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--gold); animation: dot-pulse 1.2s ease-in-out infinite;
        }
        .analysis-loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .analysis-loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .analysis-loading-text {
            font-family: var(--font-body); font-size: 13px; color: var(--white-dim);
        }

        .confidence-bar-wrap {
            display: flex; align-items: center; gap: 10px; margin: 8px 0 4px;
        }
        .confidence-label {
            font-family: var(--font-mono); font-size: 10px;
            color: var(--white-dim); letter-spacing: 0.06em; min-width: 70px;
        }
        .confidence-bar {
            flex: 1; height: 4px; background: var(--navy-light);
            border-radius: var(--radius-pill); overflow: hidden;
        }
        .confidence-fill {
            height: 100%; border-radius: var(--radius-pill);
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            transition: width 0.6s ease;
        }
        .confidence-val {
            font-family: var(--font-mono); font-size: 10px;
            color: var(--gold-light); min-width: 28px; text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Coffee Brewing Assistant</h1>
            <p>Hoffmann Method / Clever Dripper / Oxo Grinder</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('add-bean')">Add Bean</button>
            <button class="tab" onclick="switchTab('my-beans')">My Beans</button>
            <button class="tab" onclick="switchTab('brew-log')">Brew & Adjust</button>
        </div>

        <div class="content">
            <div id="add-bean" class="tab-content active">
                <div class="section-title">Add New Coffee</div>
                <div class="form-group">
                    <label>Snap Your Bag</label>
                    <div class="photo-upload-zone" id="photo-upload-zone" onclick="document.getElementById('bean-photo-input').click()">
                        <input type="file" id="bean-photo-input" accept="image/*" capture="environment" onchange="handlePhotoUpload(event)">
                        <div id="photo-placeholder">
                            <div class="photo-upload-icon">📷</div>
                            <div class="photo-upload-text">Tap to <span>take a photo</span> of your coffee bag<br><small style="color:var(--white-dim); font-size:11px; font-family:var(--font-mono);">reads the label and fills in details</small></div>
                        </div>
                    </div>
                    <div class="scan-status" id="scan-status">
                        <span id="scan-status-text">Analyzing bag...</span>
                    </div>
                </div>
                <div class="divider">
                    <div class="divider-line"></div>
                    <button class="divider-btn" id="manual-toggle-btn" onclick="toggleManualFields()">or enter manually &#x25BE;</button>
                    <div class="divider-line"></div>
                </div>
                <div id="manual-fields" style="display:none;">
                    <div class="form-group">
                        <label>Coffee Name / Roaster</label>
                        <input type="text" id="bean-name" placeholder="e.g., Blue Bottle Ethiopia Yirgacheffe">
                    </div>
                    <div class="form-group">
                        <label>Roast Level</label>
                        <select id="roast-level">
                            <option value="">Select roast level</option>
                            <option value="light">Light</option>
                            <option value="light-medium">Light-Medium</option>
                            <option value="medium">Medium</option>
                            <option value="medium-dark">Medium-Dark</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Origin / Notes (optional)</label>
                        <input type="text" id="origin" placeholder="e.g., Ethiopia, Kenya, fruity notes">
                    </div>
                    <div class="form-group">
                        <label>Roast Date (optional)</label>
                        <input type="date" id="roast-date">
                    </div>
                    <button class="btn" onclick="addBean()">Get Brew Recipe</button>
                </div>
            </div>

            <div id="my-beans" class="tab-content">
                <div class="section-title">My Coffee Collection</div>
                <div id="beans-list" class="bean-grid"></div>
            </div>

            <div id="brew-log" class="tab-content">
                <div class="section-title">Log Brew & Get Adjustments</div>
                <div class="form-group">
                    <label>Select Coffee</label>
                    <select id="brew-bean-select">
                        <option value="">Choose a coffee...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Brew Ratio</label>
                    <div class="ratio-selector">
                        <button class="ratio-btn" onclick="selectRatio('21/350')">21g / 350g</button>
                        <button class="ratio-btn" onclick="selectRatio('24/400')">24g / 400g</button>
                        <button class="ratio-btn" onclick="selectRatio('27/450')">27g / 450g</button>
                    </div>
                    <input type="hidden" id="brew-ratio">
                </div>
                <div class="form-group">
                    <label>How did it taste?</label>
                    <textarea id="tasting-notes" placeholder="e.g., Too sour, bit weak, perfect!, over-extracted and bitter"></textarea>
                </div>
                <button class="btn" onclick="logBrew()">Get Adjustments</button>
                <div id="adjustment-results"></div>
            </div>
        </div>
    </div>

    <script>
        let beans = [];
        let currentRecipe = null;
        let pendingPhoto = null;

        // ── CONFIGURE THIS ──────────────────────────────────────
        // Your Cloudflare Worker URL (no trailing slash).
        // e.g., https://coffee-assistant.YOUR-SUBDOMAIN.workers.dev
        const WORKER_URL = "https://coffee-scanner.minotfrye.workers.dev";
        // ────────────────────────────────────────────────────────

        window.onload = function() {
            loadBeans();
            renderBeansList();
            updateBrewBeanSelect();
        };

        function loadBeans() {
            const stored = localStorage.getItem('coffee-beans');
            if (stored) beans = JSON.parse(stored);
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const maxW = 600, maxH = 600;
                    let w = img.width, h = img.height;
                    if (w > maxW || h > maxH) {
                        const ratio = Math.min(maxW / w, maxH / h);
                        w = Math.round(w * ratio);
                        h = Math.round(h * ratio);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    pendingPhoto = canvas.toDataURL('image/jpeg', 0.75);
                    showPhotoPreview(pendingPhoto);

                    // Create a smaller version for the AI scan (faster upload)
                    const scanMaxW = 400, scanMaxH = 400;
                    let sw = img.width, sh = img.height;
                    if (sw > scanMaxW || sh > scanMaxH) {
                        const sr = Math.min(scanMaxW / sw, scanMaxH / sh);
                        sw = Math.round(sw * sr);
                        sh = Math.round(sh * sr);
                    }
                    const scanCanvas = document.createElement('canvas');
                    scanCanvas.width = sw; scanCanvas.height = sh;
                    scanCanvas.getContext('2d').drawImage(img, 0, 0, sw, sh);
                    const scanPhoto = scanCanvas.toDataURL('image/jpeg', 0.5);
                    scanBagPhoto(scanPhoto);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function scanBagPhoto(dataUrl) {
            const zone = document.getElementById('photo-upload-zone');
            const statusEl = document.getElementById('scan-status');
            const statusText = document.getElementById('scan-status-text');
            zone.classList.add('scanning');
            statusEl.style.display = 'block';
            statusText.innerHTML = '🔍 Reading your coffee bag...';

            try {
                const base64Data = dataUrl.split(',')[1];
                const mediaType = dataUrl.split(';')[0].split(':')[1];

                const response = await fetch(WORKER_URL + '/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: base64Data,
                        media_type: mediaType
                    })
                });

                const parsed = await response.json();
                if (!response.ok || parsed.error) {
                    throw new Error(parsed.error || parsed.details?.error?.message || 'Scanner returned ' + response.status);
                }

                if (parsed.name) { document.getElementById('bean-name').value = parsed.name; document.getElementById('bean-name').classList.add('scan-filled'); }
                if (parsed.roastLevel) { document.getElementById('roast-level').value = parsed.roastLevel; document.getElementById('roast-level').classList.add('scan-filled'); }
                if (parsed.origin) { document.getElementById('origin').value = parsed.origin; document.getElementById('origin').classList.add('scan-filled'); }
                if (parsed.roastDate) { document.getElementById('roast-date').value = parsed.roastDate; document.getElementById('roast-date').classList.add('scan-filled'); }

                document.getElementById('manual-fields').style.display = 'block';
                document.getElementById('manual-toggle-btn').innerHTML = 'review & edit &#x25B4;';
                statusText.innerHTML = '&#x2705; Details extracted. Review below, then hit <strong>Get Brew Recipe</strong>.';
                zone.classList.remove('scanning');
            } catch (err) {
                console.error('Scan error:', err);
                statusText.innerHTML = '&#x26A0;&#xFE0F; ' + err.message + '<br><small style="opacity:0.6;">Fill in details manually below.</small>';
                zone.classList.remove('scanning');
                document.getElementById('manual-fields').style.display = 'block';
                document.getElementById('manual-toggle-btn').innerHTML = 'enter manually &#x25B4;';
            }
        }

        function toggleManualFields() {
            const fields = document.getElementById('manual-fields');
            const btn = document.getElementById('manual-toggle-btn');
            if (fields.style.display === 'none') {
                fields.style.display = 'block';
                btn.innerHTML = 'hide fields &#x25B4;';
            } else {
                fields.style.display = 'none';
                btn.innerHTML = 'or enter manually &#x25BE;';
            }
        }

        function showPhotoPreview(dataUrl) {
            const zone = document.getElementById('photo-upload-zone');
            zone.classList.add('has-photo');
            zone.innerHTML = `
                <input type="file" id="bean-photo-input" accept="image/*" capture="environment" onchange="handlePhotoUpload(event)">
                <img src="${dataUrl}" class="photo-preview" alt="Bean photo preview">
                <button class="photo-remove-btn" onclick="event.stopPropagation(); removePhoto();">&times;</button>
            `;
        }

        function removePhoto() {
            pendingPhoto = null;
            const zone = document.getElementById('photo-upload-zone');
            zone.classList.remove('has-photo', 'scanning');
            zone.innerHTML = `
                <input type="file" id="bean-photo-input" accept="image/*" capture="environment" onchange="handlePhotoUpload(event)">
                <div id="photo-placeholder">
                    <div class="photo-upload-icon">📷</div>
                    <div class="photo-upload-text">Tap to <span>take a photo</span> of your coffee bag<br><small style="color:var(--white-dim); font-size:11px; font-family:var(--font-mono);">reads the label and fills in details</small></div>
                </div>
            `;
            document.getElementById('scan-status').style.display = 'none';
            document.querySelectorAll('.scan-filled').forEach(el => el.classList.remove('scan-filled'));
        }

        function saveBeans() { localStorage.setItem('coffee-beans', JSON.stringify(beans)); }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        function getGrindRecommendation(roastLevel) {
            const m = {
                'light': { grind: 7.3, note: 'Medium-fine, finer to extract brightness', steepMin: 2.5 },
                'light-medium': { grind: 7.6, note: 'Medium, balanced extraction', steepMin: 2 },
                'medium': { grind: 8, note: 'Medium, good starting point', steepMin: 2 },
                'medium-dark': { grind: 8.6, note: 'Medium-coarse, prevent over-extraction', steepMin: 1.5 },
                'dark': { grind: 9, note: 'Medium-coarse, minimize bitterness', steepMin: 1.5 }
            };
            return m[roastLevel] || m['medium'];
        }

        function getTempRecommendation(roastLevel) {
            const m = {
                'light': '205-212°F (just off boil)',
                'light-medium': '200-208°F (30-60s off boil)',
                'medium': '195-205°F (1-2 min off boil)',
                'medium-dark': '195-200°F (1.5-2 min off boil)',
                'dark': '190-195°F (2 min off boil)'
            };
            return m[roastLevel] || m['medium'];
        }

        async function addBean() {
            const name = document.getElementById('bean-name').value.trim();
            const roastLevel = document.getElementById('roast-level').value;
            const origin = document.getElementById('origin').value.trim();
            const roastDate = document.getElementById('roast-date').value;
            if (!name || !roastLevel) { alert('Please enter coffee name and roast level'); return; }

            // Build a partial bean to send to the Worker for recipe generation
            const partialBean = { name, roastLevel, origin, roastDate };

            // Show loading state in the recipe area
            const loadingHtml = `
                <div class="recipe-card">
                    <h3>Brew Recipe: ${name}</h3>
                    <div class="analysis-loading" style="margin-top:0;">
                        <div class="analysis-loading-dot"></div>
                        <div class="analysis-loading-dot"></div>
                        <div class="analysis-loading-dot"></div>
                        <div class="analysis-loading-text">Generating recipe...</div>
                    </div>
                </div>`;
            const parent = document.getElementById('add-bean');
            const existing = parent.querySelector('.recipe-card');
            if (existing) existing.remove();
            parent.insertAdjacentHTML('beforeend', loadingHtml);

            // Clear the form
            document.getElementById('bean-name').value = '';
            document.getElementById('roast-level').value = '';
            document.getElementById('origin').value = '';
            document.getElementById('roast-date').value = '';
            removePhoto();
            document.getElementById('manual-fields').style.display = 'none';
            document.getElementById('manual-toggle-btn').innerHTML = 'or enter manually &#x25BE;';
            document.querySelectorAll('.scan-filled').forEach(el => el.classList.remove('scan-filled'));

            // Fetch recipe from Worker
            let recipeData = null;
            try {
                const response = await fetch(WORKER_URL + '/generate-recipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bean: partialBean })
                });
                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error || 'Worker error');
                recipeData = data;
            } catch (err) {
                console.error('Recipe generation failed, using defaults:', err);
                // Fallback to lookup table
                const grindRec = getGrindRecommendation(roastLevel);
                recipeData = {
                    grindSetting: grindRec.grind,
                    grindNote: grindRec.note,
                    tempRec: getTempRecommendation(roastLevel),
                    steepMin: grindRec.steepMin || 2,
                    recipeNote: null
                };
            }

            const bean = {
                id: Date.now(), name, roastLevel, origin, roastDate,
                grindSetting: recipeData.grindSetting,
                grindNote: recipeData.grindNote,
                steepMin: recipeData.steepMin,
                tempRec: recipeData.tempRec,
                recipeNote: recipeData.recipeNote || null,
                brewLogs: [], archived: false,
                addedDate: new Date().toISOString(),
                photo: pendingPhoto || null
            };

            beans.push(bean);
            saveBeans();
            showRecipe(bean);
            renderBeansList();
            updateBrewBeanSelect();
        }

        function showRecipe(bean) {
            window._currentRecipeBean = bean;
            renderRecipeForSize(bean, bean._lastSize || '350');
        }

        function renderRecipeForSize(bean, sizeStr) {
            const sizes = { '350': { water: 350, coffee: 21 }, '400': { water: 400, coffee: 24 }, '450': { water: 450, coffee: 27 } };
            const s = sizes[sizeStr] || sizes['350'];
            const steepMin = bean.steepMin || 2;
            const steepWhole = Math.floor(steepMin);
            const steepSec = Math.round((steepMin - steepWhole) * 60);
            const steepDisplay = steepSec > 0 ? `${steepWhole}:${String(steepSec).padStart(2,'0')}` : `${steepWhole}:00`;
            const stirTotalSec = steepMin * 60 + 30;
            const stirM = Math.floor(stirTotalSec / 60);
            const stirS = Math.round(stirTotalSec % 60);
            const stirDisplay = `${stirM}:${String(stirS).padStart(2,'0')}`;

            const html = `
                <div class="recipe-card">
                    <h3>Brew Recipe: ${bean.name}</h3>
                    ${bean.photo ? `<img src="${bean.photo}" class="recipe-photo" alt="${bean.name}">` : ''}
                    <div style="margin-bottom:20px;">
                        <label>Brew Size</label>
                        <div class="ratio-selector">
                            <button class="ratio-btn ${sizeStr==='350'?'selected':''}" onclick="switchRecipeSize('350')">21g / 350g</button>
                            <button class="ratio-btn ${sizeStr==='400'?'selected':''}" onclick="switchRecipeSize('400')">24g / 400g</button>
                            <button class="ratio-btn ${sizeStr==='450'?'selected':''}" onclick="switchRecipeSize('450')">27g / 450g</button>
                        </div>
                    </div>
                    <div class="recipe-detail"><span class="recipe-label">Coffee</span><span class="recipe-value">${s.coffee}g</span></div>
                    <div class="recipe-detail"><span class="recipe-label">Water</span><span class="recipe-value">${s.water}g</span></div>
                    <div class="recipe-detail"><span class="recipe-label">Oxo Grind</span><span class="recipe-value">${bean.grindSetting}</span></div>
                    <div class="recipe-detail"><span class="recipe-label">Water Temp</span><span class="recipe-value">${bean.tempRec}</span></div>
                    <div class="recipe-detail" style="border-bottom:none;"><span class="recipe-label">Steep Time</span><span class="recipe-value">${steepDisplay}</span></div>
                    ${bean.recipeNote ? `<div style="margin-top:16px; padding:14px 16px; background:var(--navy); border-radius:var(--radius-md); border-left:3px solid var(--gold);"><p style="font-family:var(--font-body); font-size:13px; color:var(--white-muted); line-height:1.6; font-style:italic;">${bean.recipeNote}</p></div>` : ''}
                    <div class="brew-steps">
                        <h4>Hoffmann Method</h4>
                        <div class="brew-step"><span class="step-number">1</span>Rinse filter with hot water, discard</div>
                        <div class="brew-step"><span class="step-number">2</span>Pour <strong>${s.water}g</strong> water into the Clever</div>
                        <div class="brew-step"><span class="step-number">3</span>Add <strong>${s.coffee}g</strong> coffee, stir, start timer</div>
                        <div class="brew-step"><span class="step-number">4</span>At <strong>${steepDisplay}</strong>, stir again</div>
                        <div class="brew-step"><span class="step-number">5</span>At <strong>${stirDisplay}</strong>, place on cup to drain</div>
                        <div class="brew-step"><span class="step-number">6</span>Swirl, sip, enjoy</div>
                    </div>
                    ${renderBrewHistory(bean)}
                </div>
            `;
            const parent = document.getElementById('add-bean');
            const existing = parent.querySelector('.recipe-card');
            if (existing) existing.remove();
            parent.insertAdjacentHTML('beforeend', html);
        }

        function switchRecipeSize(size) {
            const bean = window._currentRecipeBean;
            if (bean) { bean._lastSize = size; renderRecipeForSize(bean, size); }
        }

        function renderBeansList() {
            const container = document.getElementById('beans-list');
            if (beans.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">☕</div><p>No beans added yet. Add your first coffee to get started.</p></div>`;
                return;
            }
            const active = beans.filter(b => !b.archived);
            const archived = beans.filter(b => b.archived);
            let html = '';
            active.forEach(b => { html += createBeanCard(b); });
            if (archived.length > 0) {
                html += '<div class="archived-heading" style="grid-column:1/-1;">Archived</div>';
                archived.forEach(b => { html += createBeanCard(b); });
            }
            container.innerHTML = html;
        }

        function createBeanCard(bean) {
            const daysOld = bean.roastDate ? Math.floor((Date.now() - new Date(bean.roastDate)) / 864e5) : null;
            let fHtml = '';
            if (daysOld !== null) {
                if (daysOld > 30) fHtml = '<span class="freshness-badge freshness-old">getting old</span>';
                else if (daysOld > 14) fHtml = '<span class="freshness-badge freshness-aging">aging</span>';
                else fHtml = '<span class="freshness-badge freshness-fresh">fresh</span>';
            }
            return `
                <div class="bean-card ${bean.archived?'archived':''}" onclick="viewBean(${bean.id})">
                    ${bean.photo ? `<img src="${bean.photo}" class="bean-card-photo" alt="${bean.name}">` : ''}
                    <div class="bean-name">${bean.name}</div>
                    <div class="bean-details">${bean.roastLevel.charAt(0).toUpperCase()+bean.roastLevel.slice(1)} roast${bean.origin?' · '+bean.origin:''}${daysOld!==null?' · '+daysOld+'d':''}</div>
                    ${fHtml}
                    <div class="bean-setting">grind: ${bean.grindSetting}</div>
                    ${bean.brewLogs.length > 0 ? `<div class="brew-count">${bean.brewLogs.length} brew${bean.brewLogs.length>1?'s':''} logged</div>` : ''}
                    <div class="bean-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-small btn-ghost" onclick="viewBean(${bean.id})">Recipe</button>
                        ${!bean.archived ? `<button class="btn btn-small btn-secondary" onclick="archiveBean(${bean.id})">Archive</button>` : `<button class="btn btn-small btn-secondary" onclick="unarchiveBean(${bean.id})">Restore</button>`}
                        <button class="btn btn-small btn-danger" onclick="deleteBean(${bean.id})">Delete</button>
                    </div>
                </div>`;
        }

        function viewBean(id) {
            const bean = beans.find(b => b.id === id);
            if (bean) {
                showRecipe(bean);
                switchTab('add-bean');
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab')[0].classList.add('active');
            }
        }

        function archiveBean(id) {
            const bean = beans.find(x => x.id === id);
            if (bean) { bean.archived = true; saveBeans(); renderBeansList(); updateBrewBeanSelect(); }
        }
        function unarchiveBean(id) {
            const bean = beans.find(x => x.id === id);
            if (bean) { bean.archived = false; saveBeans(); renderBeansList(); updateBrewBeanSelect(); }
        }
        function deleteBean(id) {
            if (confirm('Delete this coffee?')) {
                beans = beans.filter(x => x.id !== id);
                saveBeans(); renderBeansList(); updateBrewBeanSelect();
            }
        }

        function updateBrewBeanSelect() {
            const sel = document.getElementById('brew-bean-select');
            sel.innerHTML = '<option value="">Choose a coffee...</option>';
            beans.filter(b => !b.archived).forEach(b => {
                sel.innerHTML += `<option value="${b.id}">${b.name} (Grind: ${b.grindSetting})</option>`;
            });
        }

        function selectRatio(ratio) {
            document.querySelectorAll('#brew-log .ratio-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('brew-ratio').value = ratio;
        }

        async function logBrew() {
            const beanId = parseInt(document.getElementById('brew-bean-select').value);
            const ratio = document.getElementById('brew-ratio').value;
            const notes = document.getElementById('tasting-notes').value.trim();
            if (!beanId || !ratio || !notes) { alert('Please select coffee, ratio, and add tasting notes'); return; }
            const bean = beans.find(b => b.id === beanId);
            if (!bean) return;

            document.getElementById('adjustment-results').innerHTML = `
                <div class="analysis-loading">
                    <div class="analysis-loading-dot"></div>
                    <div class="analysis-loading-dot"></div>
                    <div class="analysis-loading-dot"></div>
                    <div class="analysis-loading-text">Analyzing your brew...</div>
                </div>`;

            const grindBefore = bean.grindSetting;
            const adj = await getAdjustments(notes, bean, ratio);

            bean.brewLogs.push({
                date: new Date().toISOString(),
                ratio,
                grindUsed: grindBefore,
                notes,
                adjustments: adj
            });
            if (adj.newGrind !== null && adj.newGrind !== grindBefore) {
                bean.grindSetting = parseFloat(adj.newGrind.toFixed(1));
            }
            saveBeans();
            showAdjustments(bean, adj, grindBefore);
            document.getElementById('tasting-notes').value = '';
            document.querySelectorAll('#brew-log .ratio-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('brew-ratio').value = '';
            renderBeansList();
            updateBrewBeanSelect();
        }

        async function getAdjustments(notes, bean, ratio) {
            try {
                const response = await fetch(WORKER_URL + '/analyze-brew', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bean, ratio, notes })
                });
                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error || 'Worker error');
                return data;
            } catch (err) {
                console.error('Brew analysis error, falling back:', err);
                return fallbackAdjustments(notes, bean);
            }
        }

        function fallbackAdjustments(notes, bean) {
            const n = notes.toLowerCase();
            let a = { grindDirection: 'none', newGrind: null, grindConfidence: 0, tempAdjust: null, timeAdjust: null, keepSetting: false, diagnosis: 'Could not reach AI analysis.', rationale: 'Using basic keyword fallback.' };
            if (n.includes('sour')||n.includes('acidic')||n.includes('thin')||n.includes('sharp')) {
                a.grindDirection='finer'; a.newGrind=Math.max(1, parseFloat((bean.grindSetting-0.3).toFixed(1)));
                a.grindConfidence=65; a.tempAdjust='Try hotter water (closer to boil)';
                a.diagnosis='Likely under-extracted.'; a.rationale='Sour/acidic/thin notes suggest insufficient extraction.';
            } else if (n.includes('bitter')||n.includes('harsh')||n.includes('astringent')) {
                a.grindDirection='coarser'; a.newGrind=Math.min(15, parseFloat((bean.grindSetting+0.3).toFixed(1)));
                a.grindConfidence=65; a.tempAdjust='Try cooler water (1–2 min off boil)';
                a.diagnosis='Likely over-extracted.'; a.rationale='Bitter/harsh notes suggest over-extraction.';
            } else if (n.includes('perfect')||n.includes('great')||n.includes('balanced')||n.includes('excellent')) {
                a.keepSetting=true; a.grindConfidence=90; a.diagnosis='Dialed in.'; a.rationale='Keep this setting.';
            }
            return a;
        }

        function showAdjustments(bean, adj, grindBefore) {
            const grindChanged = adj.newGrind !== null && parseFloat(adj.newGrind) !== parseFloat(grindBefore);
            let html = '<div class="adjustment-guide"><h4>Brew Analysis</h4>';

            if (adj.diagnosis) html += `<p>${adj.diagnosis}</p>`;
            if (adj.rationale && adj.rationale !== adj.diagnosis) {
                html += `<p><em style="color:var(--white-dim);font-size:12px;">${adj.rationale}</em></p>`;
            }

            if (adj.keepSetting) {
                html += `<p style="margin-top:10px;"><strong>Grind:</strong> Keep at ${grindBefore} — dialed in.</p>`;
            } else if (grindChanged) {
                html += `<p style="margin-top:10px;"><strong>New Grind:</strong> ${parseFloat(adj.newGrind).toFixed(1)} <span style="color:var(--white-dim)">(was ${grindBefore})</span></p>`;
                if (adj.grindConfidence) {
                    html += `<div class="confidence-bar-wrap">
                        <span class="confidence-label">Confidence</span>
                        <div class="confidence-bar"><div class="confidence-fill" style="width:${adj.grindConfidence}%"></div></div>
                        <span class="confidence-val">${adj.grindConfidence}%</span>
                    </div>`;
                }
            } else if (adj.grindDirection === 'none') {
                html += `<p style="margin-top:10px;"><strong>Grind:</strong> No change recommended (${grindBefore}).</p>`;
            }
            if (adj.tempAdjust) html += `<p><strong>Temperature:</strong> ${adj.tempAdjust}</p>`;
            if (adj.timeAdjust) html += `<p><strong>Steep time:</strong> ${adj.timeAdjust}</p>`;
            html += '</div>';

            document.getElementById('adjustment-results').innerHTML = html;
        }

        function renderBrewHistory(bean) {
            if (!bean.brewLogs || bean.brewLogs.length === 0) return '';
            const entries = [...bean.brewLogs].reverse().map(log => {
                const d = new Date(log.date);
                const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const adj = log.adjustments || {};
                let analysisHtml = '';
                if (adj.diagnosis) analysisHtml += adj.diagnosis + ' ';
                if (adj.rationale && adj.rationale !== adj.diagnosis) analysisHtml += adj.rationale;
                if (!analysisHtml && adj.general && adj.general.length) analysisHtml = adj.general.join(' ');
                return `<div class="brew-log-entry">
                    <div class="brew-log-meta">
                        <span class="brew-log-date">${dateStr} &middot; ${log.ratio || ''}</span>
                        <span class="brew-log-grind">grind ${log.grindUsed}</span>
                    </div>
                    <div class="brew-log-notes">"${log.notes}"</div>
                    ${analysisHtml ? `<div class="brew-log-analysis">${analysisHtml}</div>` : ''}
                </div>`;
            }).join('');
            return `<div class="brew-history">
                <div class="brew-history-heading">
                    <span>Brew History (${bean.brewLogs.length})</span>
                    <button class="brew-history-toggle" onclick="toggleBrewHistory(this)">show &#x25BE;</button>
                </div>
                <div class="brew-history-entries" style="display:none;">${entries}</div>
            </div>`;
        }

        function toggleBrewHistory(btn) {
            const entries = btn.closest('.brew-history').querySelector('.brew-history-entries');
            const hidden = entries.style.display === 'none';
            entries.style.display = hidden ? 'block' : 'none';
            btn.innerHTML = hidden ? 'hide &#x25B4;' : 'show &#x25BE;';
        }
    </script>
</body>
</html>
